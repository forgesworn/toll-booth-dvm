  <!-- Illustration: toll booth with relay antenna broadcasting Nostr events -->
  <g transform="translate(220, 140)">
    <!-- Ground / road surface -->
    <rect x="20" y="310" width="300" height="8" rx="2" fill="#1e293b"/>
    <line x1="80" y1="314" x2="100" y2="314" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>
    <line x1="120" y1="314" x2="140" y2="314" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>
    <line x1="160" y1="314" x2="180" y2="314" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>
    <line x1="200" y1="314" x2="220" y2="314" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>

    <!-- Booth structure (kiosk) -->
    <rect x="55" y="170" width="70" height="140" rx="4" fill="url(#steel)"/>
    <rect x="60" y="175" width="60" height="130" rx="3" fill="#1e293b"/>
    <!-- Booth window -->
    <rect x="68" y="190" width="44" height="35" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <!-- Screen showing Nostr event -->
    <rect x="72" y="194" width="36" height="27" rx="1" fill="#0f172a"/>
    <rect x="76" y="198" width="28" height="5" rx="1" fill="#22d3ee" opacity="0.4"/>
    <rect x="76" y="206" width="18" height="4" rx="1" fill="#22d3ee" opacity="0.25"/>
    <rect x="76" y="213" width="24" height="4" rx="1" fill="#22d3ee" opacity="0.15"/>
    <!-- Booth roof -->
    <polygon points="48,170 135,170 130,158 53,158" fill="url(#steelLight)"/>
    <rect x="48" y="155" width="87" height="5" rx="1" fill="#64748b"/>
    <!-- Booth base -->
    <rect x="55" y="305" width="70" height="5" rx="1" fill="#475569"/>

    <!-- Relay antenna on booth roof -->
    <g transform="translate(90, 100)">
      <!-- Antenna mast -->
      <rect x="-2" y="20" width="4" height="38" fill="url(#steelLight)"/>
      <!-- Antenna dish (simplified parabolic) -->
      <path d="M -16,20 Q 0,5 16,20" fill="none" stroke="url(#amber)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="18" r="3" fill="url(#amberLight)"/>
      <!-- Antenna base mount -->
      <rect x="-6" y="56" width="12" height="4" rx="1" fill="#475569"/>
    </g>

    <!-- Signal waves broadcasting from antenna -->
    <g transform="translate(90, 95)" stroke="url(#amber)" fill="none" stroke-linecap="round">
      <path d="M 0,-5 Q -20,-25 -15,-45" stroke-width="2" opacity="0.5"/>
      <path d="M 0,-5 Q 20,-25 15,-45" stroke-width="2" opacity="0.5"/>
      <path d="M 0,-5 Q -30,-30 -28,-55" stroke-width="1.5" opacity="0.3"/>
      <path d="M 0,-5 Q 30,-30 28,-55" stroke-width="1.5" opacity="0.3"/>
      <path d="M 0,-5 Q -40,-35 -42,-65" stroke-width="1" opacity="0.15"/>
      <path d="M 0,-5 Q 40,-35 42,-65" stroke-width="1" opacity="0.15"/>
    </g>

    <!-- Barrier post -->
    <rect x="120" y="180" width="12" height="130" rx="2" fill="url(#steelLight)"/>
    <rect x="118" y="178" width="16" height="8" rx="2" fill="#64748b"/>
    <!-- Pivot joint -->
    <circle cx="126" cy="190" r="6" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="126" cy="190" r="2.5" fill="#334155"/>

    <!-- Barrier arm (raised) -->
    <g transform="rotate(-30, 126, 190)">
      <rect x="126" y="186" width="160" height="8" rx="3" fill="url(#amber)"/>
      <rect x="150" y="186" width="12" height="8" fill="#0f172a" opacity="0.3"/>
      <rect x="174" y="186" width="12" height="8" fill="#0f172a" opacity="0.3"/>
      <rect x="198" y="186" width="12" height="8" fill="#0f172a" opacity="0.3"/>
      <rect x="222" y="186" width="12" height="8" fill="#0f172a" opacity="0.3"/>
      <rect x="246" y="186" width="12" height="8" fill="#0f172a" opacity="0.3"/>
      <rect x="270" y="186" width="12" height="8" fill="#0f172a" opacity="0.3"/>
      <circle cx="288" cy="190" r="5" fill="#fbbf24"/>
    </g>

    <!-- Lightning bolt through the gate -->
    <g filter="url(#glow)" transform="translate(175, 210)">
      <polygon points="20,0 0,42 16,42 -4,85 50,32 30,32 52,0" fill="url(#amberLight)"/>
    </g>

    <!-- Floating Nostr event badges (kind numbers) -->
    <g opacity="0.7">
      <!-- 5800 badge (job request) -->
      <g transform="translate(220, 80)">
        <rect x="0" y="0" width="42" height="20" rx="4" fill="#1e293b" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
        <text x="21" y="14" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" font-weight="bold" fill="#22d3ee" opacity="0.8">5800</text>
      </g>
      <!-- 6800 badge (result) -->
      <g transform="translate(260, 130)">
        <rect x="0" y="0" width="42" height="20" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
        <text x="21" y="14" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" font-weight="bold" fill="#fbbf24" opacity="0.6">6800</text>
      </g>
      <!-- 7000 badge (feedback) -->
      <g transform="translate(240, 175)">
        <rect x="0" y="0" width="42" height="20" rx="4" fill="#1e293b" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
        <text x="21" y="14" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" font-weight="bold" fill="#94a3b8" opacity="0.4">7000</text>
      </g>
    </g>

    <!-- Floating sat coins -->
    <g opacity="0.5">
      <ellipse cx="200" cy="260" rx="9" ry="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="200" y="264" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fbbf24">S</text>
      <ellipse cx="240" cy="240" rx="7" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6"/>
      <text x="240" y="244" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#f59e0b" opacity="0.6">S</text>
    </g>
  </g>

  <!-- Divider -->
  <g transform="translate(580, 220)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="0" x2="6" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <!-- DVM badge -->
    <g transform="translate(-14, 82)">
      <rect x="0" y="0" width="34" height="18" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="17" y="13" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="9" font-weight="bold" fill="#f59e0b">DVM</text>
    </g>
  </g>

  <!-- Title -->
  <text x="660" y="310" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace" font-size="48" font-weight="bold" fill="#f8fafc" letter-spacing="-1">toll-booth-</text>
  <text x="660" y="360" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace" font-size="48" font-weight="bold" fill="#f8fafc" letter-spacing="-1">dvm</text>

  <!-- Tagline -->
  <text x="662" y="395" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">paid APIs on nostr. zero custody.</text>

  <!-- Keyword ticker along bottom -->
  <g opacity="0.06" fill="#94a3b8">
    <text y="622" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12" letter-spacing="1">
      <tspan x="40">nostr</tspan>
      <tspan x="110">nip-90</tspan>
      <tspan x="190">dvm</tspan>
      <tspan x="240">lightning</tspan>
      <tspan x="340">l402</tspan>
      <tspan x="400">bitcoin</tspan>
      <tspan x="490">bolt11</tspan>
      <tspan x="570">proxy</tspan>
      <tspan x="640">relay</tspan>
      <tspan x="710">micropayments</tspan>
      <tspan x="870">non-custodial</tspan>
      <tspan x="1010">typescript</tspan>
      <tspan x="1120">data-vending-machine</tspan>
    </text>
  </g>
</svg>
